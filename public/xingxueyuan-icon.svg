<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="60" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- 书本 -->
  <g transform="translate(32, 45)">
    <rect x="0" y="0" width="64" height="45" rx="4" fill="url(#bookGradient)"/>
    <rect x="5" y="5" width="54" height="35" rx="2" fill="#fff" opacity="0.9"/>
    <line x1="32" y1="0" x2="32" y2="45" stroke="#e0e0e0" stroke-width="2"/>
    <!-- 书页装饰线 -->
    <line x1="10" y1="15" x2="54" y2="15" stroke="#d0d0d0" stroke-width="1.5"/>
    <line x1="10" y1="22" x2="48" y2="22" stroke="#d0d0d0" stroke-width="1.5"/>
    <line x1="10" y1="29" x2="52" y2="29" stroke="#d0d0d0" stroke-width="1.5"/>
  </g>
  
  <!-- 星星 -->
  <g transform="translate(64, 30)">
    <polygon points="0,-20 5,-7 19,-7 8,2 12,16 0,8 -12,16 -8,2 -19,-7 -5,-7" fill="url(#starGradient)" stroke="#FFD700" stroke-width="1.5"/>
  </g>
  
  <!-- 小星星装饰 -->
  <g transform="translate(20, 25)">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,6 0,3 -5,6 -3,1 -7,-3 -2,-3" fill="#FFD700" opacity="0.6"/>
  </g>
  <g transform="translate(108, 35)">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,6 0,3 -5,6 -3,1 -7,-3 -2,-3" fill="#FFD700" opacity="0.6"/>
  </g>
</svg>
